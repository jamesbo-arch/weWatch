<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="face-clip-as">
      <circle cx="200" cy="200" r="182"/>
    </clipPath>
  </defs>

  <!-- Bezel -->
  <circle cx="200" cy="200" r="196" fill="#c8ccd4"/>
  <!-- Watch face background -->
  <circle cx="200" cy="200" r="182" fill="#f0f2f5"/>

  <!-- Blue accent ring (full, thin) -->
  <circle cx="200" cy="200" r="172"
    fill="none"
    stroke="#1d4ed8"
    stroke-width="3"
    stroke-opacity="0.15"/>
  <!-- Progress arc (blue, ~65% filled) -->
  <!-- Circumference at r=172: 1080.7 -->
  <circle cx="200" cy="200" r="172"
    fill="none"
    stroke="#1d4ed8"
    stroke-width="5"
    stroke-opacity="0.9"
    stroke-dasharray="702 378"
    stroke-dashoffset="270"
    stroke-linecap="round"
    transform="rotate(-90 200 200)"/>

  <!-- Tick marks -->
  <g stroke="#1d4ed8" stroke-opacity="0.3" stroke-width="1.5">
    <line x1="200" y1="28" x2="200" y2="40" transform="rotate(0 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="36" transform="rotate(30 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="36" transform="rotate(60 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="40" transform="rotate(90 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="36" transform="rotate(120 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="36" transform="rotate(150 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="40" transform="rotate(180 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="36" transform="rotate(210 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="36" transform="rotate(240 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="40" transform="rotate(270 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="36" transform="rotate(300 200 200)"/>
    <line x1="200" y1="28" x2="200" y2="36" transform="rotate(330 200 200)"/>
  </g>

  <!-- Heart rate at top: icon + value -->
  <!-- HR Icon (simple heart shape) -->
  <path d="M 192 68 C 192 64 196 60 200 64 C 204 60 208 64 208 68 C 208 72 204 76 200 80 C 196 76 192 72 192 68 Z"
    fill="#ef4444"/>
  <text x="215" y="80" text-anchor="start"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="13" font-weight="600"
    fill="#1f2937">72</text>
  <text x="229" y="80" text-anchor="start"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11" font-weight="400"
    fill="#6b7280">bpm</text>

  <!-- Centered label above time -->
  <text x="200" y="152" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11" font-weight="500" letter-spacing="2"
    fill="#1d4ed8" fill-opacity="0.7">RUN</text>

  <!-- Digital time "10:42" -->
  <text x="200" y="210" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="68" font-weight="800" letter-spacing="-2"
    fill="#1e3a5f">10:42</text>

  <!-- Date below time -->
  <text x="200" y="235" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="13" font-weight="500" letter-spacing="2"
    fill="#374151">THU 08</text>

  <!-- Left data field (9 o'clock) — Pace -->
  <rect x="38" y="178" width="72" height="44" rx="6" fill="#1d4ed8" fill-opacity="0.08"/>
  <text x="74" y="196" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="9" font-weight="600" letter-spacing="1"
    fill="#1d4ed8" fill-opacity="0.7">PACE</text>
  <text x="74" y="214" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="16" font-weight="700"
    fill="#1e3a5f">5:24</text>

  <!-- Right data field (3 o'clock) — Distance -->
  <rect x="290" y="178" width="72" height="44" rx="6" fill="#1d4ed8" fill-opacity="0.08"/>
  <text x="326" y="196" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="9" font-weight="600" letter-spacing="1"
    fill="#1d4ed8" fill-opacity="0.7">KM</text>
  <text x="326" y="214" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="16" font-weight="700"
    fill="#1e3a5f">7.2</text>

  <!-- Step counter at bottom -->
  <!-- Shoe / steps icon (simplified) -->
  <text x="200" y="290" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="10" font-weight="600" letter-spacing="1"
    fill="#6b7280">STEPS</text>
  <text x="200" y="312" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22" font-weight="700"
    fill="#1e3a5f">8,432</text>

  <!-- Step progress bar -->
  <rect x="148" y="320" width="104" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="148" y="320" width="68" height="4" rx="2" fill="#1d4ed8" fill-opacity="0.7"/>
</svg>
