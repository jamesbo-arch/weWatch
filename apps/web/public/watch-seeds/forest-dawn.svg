<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="face-clip-fd">
      <circle cx="200" cy="200" r="182"/>
    </clipPath>
  </defs>

  <!-- Bezel -->
  <circle cx="200" cy="200" r="196" fill="#0f1a0f"/>
  <!-- Watch face background -->
  <circle cx="200" cy="200" r="182" fill="#1b2a1b"/>

  <!-- Subtle outer glow ring (amber) -->
  <circle cx="200" cy="200" r="175"
    fill="none"
    stroke="#f59e0b"
    stroke-width="2"
    stroke-opacity="0.15"/>

  <!-- Date ring (circular) — small text around the upper ring -->
  <circle cx="200" cy="200" r="158"
    fill="none"
    stroke="#ffffff"
    stroke-width="0.5"
    stroke-opacity="0.15"/>

  <!-- Tick marks (hour markers, warm amber for 12,3,6,9 and thin green for others) -->
  <g stroke="#f59e0b" stroke-opacity="0.8" stroke-width="2.5">
    <line x1="200" y1="32" x2="200" y2="48" transform="rotate(0 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="48" transform="rotate(90 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="48" transform="rotate(180 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="48" transform="rotate(270 200 200)"/>
  </g>
  <g stroke="#ffffff" stroke-opacity="0.3" stroke-width="1">
    <line x1="200" y1="32" x2="200" y2="42" transform="rotate(30 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="42" transform="rotate(60 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="42" transform="rotate(120 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="42" transform="rotate(150 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="42" transform="rotate(210 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="42" transform="rotate(240 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="42" transform="rotate(300 200 200)"/>
    <line x1="200" y1="32" x2="200" y2="42" transform="rotate(330 200 200)"/>
  </g>

  <!-- Analog clock hands -->
  <!-- Time: 10:42 -->
  <!-- Hour hand: 10:42 = 10 hours 42 minutes -->
  <!-- Hour angle: (10 * 30) + (42 * 0.5) = 300 + 21 = 321 degrees from 12 o'clock -->
  <!-- Minute hand: 42 * 6 = 252 degrees from 12 o'clock -->

  <!-- Hour hand (thick, white, shorter) -->
  <!-- 321 degrees rotation: pointing towards ~10:42 position -->
  <line x1="200" y1="200" x2="200" y2="118"
    stroke="#ffffff"
    stroke-width="6"
    stroke-linecap="round"
    transform="rotate(321 200 200)"/>
  <!-- Hour hand tail -->
  <line x1="200" y1="200" x2="200" y2="215"
    stroke="#ffffff"
    stroke-width="6"
    stroke-linecap="round"
    transform="rotate(321 200 200)"/>

  <!-- Minute hand (thinner, white, longer) -->
  <!-- 252 degrees rotation -->
  <line x1="200" y1="200" x2="200" y2="100"
    stroke="#ffffff"
    stroke-width="4"
    stroke-linecap="round"
    transform="rotate(252 200 200)"/>
  <!-- Minute hand tail -->
  <line x1="200" y1="200" x2="200" y2="222"
    stroke="#ffffff"
    stroke-width="4"
    stroke-linecap="round"
    transform="rotate(252 200 200)"/>

  <!-- Second hand (thin, amber) -->
  <!-- 42 seconds = 42 * 6 = 252 degrees, but let's use a different position for visual interest -->
  <!-- Let's show ~30 seconds = 180 degrees -->
  <line x1="200" y1="200" x2="200" y2="88"
    stroke="#f59e0b"
    stroke-width="1.5"
    stroke-linecap="round"
    transform="rotate(180 200 200)"/>
  <line x1="200" y1="200" x2="200" y2="228"
    stroke="#f59e0b"
    stroke-width="1.5"
    stroke-linecap="round"
    transform="rotate(180 200 200)"/>

  <!-- Center cap -->
  <circle cx="200" cy="200" r="5" fill="#f59e0b"/>
  <circle cx="200" cy="200" r="2.5" fill="#1b2a1b"/>

  <!-- Date indicator (3 o'clock position) -->
  <rect x="274" y="192" width="28" height="18" rx="2" fill="#0f1a0f" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <text x="288" y="204" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="10" font-weight="600"
    fill="#ffffff">08</text>

  <!-- Tree silhouette at bottom (simplified pine tree) -->
  <g clip-path="url(#face-clip-fd)" fill="#2d4a2d" fill-opacity="0.6">
    <!-- Tree trunk -->
    <rect x="197" y="336" width="6" height="18" rx="1"/>
    <!-- Tree layers (triangles as polygons) -->
    <polygon points="200,280 218,320 182,320"/>
    <polygon points="200,295 222,332 178,332"/>
    <polygon points="200,310 225,340 175,340"/>
  </g>

  <!-- Day label top -->
  <text x="200" y="76" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="12" font-weight="500" letter-spacing="2"
    fill="#f59e0b" fill-opacity="0.75">THURSDAY</text>

  <!-- Weather/temp (amber accents) -->
  <text x="134" y="240" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11" font-weight="400"
    fill="#f59e0b" fill-opacity="0.6">18°C</text>

  <!-- HR indicator -->
  <text x="270" y="240" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11" font-weight="400"
    fill="#f59e0b" fill-opacity="0.6">72 bpm</text>
</svg>
