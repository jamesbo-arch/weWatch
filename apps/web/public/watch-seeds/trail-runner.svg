<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="trail-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1e0a"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </radialGradient>
    <linearGradient id="pace-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="orange-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="face-clip-tr">
      <circle cx="200" cy="200" r="182"/>
    </clipPath>
  </defs>

  <!-- Bezel (dark earth) -->
  <circle cx="200" cy="200" r="196" fill="#0e0a04"/>
  <!-- Face background -->
  <circle cx="200" cy="200" r="182" fill="url(#trail-bg)"/>

  <!-- Topographic contour lines (background texture) -->
  <g clip-path="url(#face-clip-tr)" fill="none" stroke="#4a3b22" stroke-opacity="0.35" stroke-width="1">
    <ellipse cx="200" cy="200" rx="155" ry="90"/>
    <ellipse cx="200" cy="200" rx="132" ry="72"/>
    <ellipse cx="200" cy="200" rx="110" ry="55"/>
    <ellipse cx="200" cy="200" rx="88" ry="40"/>
    <ellipse cx="200" cy="200" rx="66" ry="28"/>
    <ellipse cx="200" cy="200" rx="44" ry="18"/>
    <!-- Offset contour for natural look -->
    <ellipse cx="185" cy="195" rx="145" ry="85"/>
    <ellipse cx="215" cy="210" rx="138" ry="78"/>
  </g>

  <!-- Outer ring (earthy accent) -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#78501e" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Elevation profile silhouette (bottom strip) -->
  <g clip-path="url(#face-clip-tr)">
    <!-- Mountain silhouette path -->
    <path d="M 18 340 L 40 320 L 60 330 L 80 295 L 100 310 L 130 265 L 155 280 L 175 248 L 200 260 L 220 232 L 248 255 L 268 230 L 290 252 L 315 270 L 335 285 L 355 260 L 375 275 L 382 340 Z"
      fill="#2d1e08" fill-opacity="0.9"/>
    <!-- Mountain ridge line -->
    <path d="M 18 340 L 40 320 L 60 330 L 80 295 L 100 310 L 130 265 L 155 280 L 175 248 L 200 260 L 220 232 L 248 255 L 268 230 L 290 252 L 315 270 L 335 285 L 355 260 L 375 275 L 382 340"
      fill="none" stroke="#f97316" stroke-opacity="0.5" stroke-width="1.5"/>
    <!-- Current position marker on elevation -->
    <circle cx="248" cy="255" r="3" fill="#f97316" fill-opacity="0.9"/>
    <line x1="248" y1="240" x2="248" y2="255" stroke="#f97316" stroke-opacity="0.6" stroke-width="1" stroke-dasharray="2 2"/>
  </g>

  <!-- GARMIN label -->
  <text x="200" y="62" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="9" font-weight="400" letter-spacing="3"
    fill="#78501e" fill-opacity="0.6">GARMIN</text>

  <!-- Time display -->
  <text x="200" y="148" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="62" font-weight="700" letter-spacing="-1"
    fill="#f5deb3">09:15</text>

  <!-- Divider -->
  <line x1="100" y1="162" x2="300" y2="162" stroke="#78501e" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Main metric: PACE (large, orange) -->
  <text x="200" y="186" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="9" font-weight="600" letter-spacing="2.5"
    fill="#f97316" fill-opacity="0.8">CURRENT PACE</text>
  <text x="200" y="218" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="42" font-weight="700" letter-spacing="1"
    fill="#f97316"
    filter="url(#orange-glow)">5:24</text>
  <text x="200" y="234" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="10" font-weight="400" letter-spacing="1.5"
    fill="#f97316" fill-opacity="0.6">min/km</text>

  <!-- Data row -->
  <line x1="65" y1="243" x2="335" y2="243" stroke="#4a3b22" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Cadence -->
  <text x="100" y="260" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" font-weight="600" letter-spacing="1.5"
    fill="#a3784a" fill-opacity="0.8">CADENCE</text>
  <text x="100" y="278" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="20" font-weight="700"
    fill="#f5deb3">178</text>
  <text x="100" y="292" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" fill="#78501e" fill-opacity="0.7">spm</text>

  <!-- Grade -->
  <text x="200" y="260" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" font-weight="600" letter-spacing="1.5"
    fill="#a3784a" fill-opacity="0.8">GRADE</text>
  <text x="200" y="278" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="20" font-weight="700"
    fill="#f97316">+8%</text>
  <text x="200" y="292" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" fill="#78501e" fill-opacity="0.7">ascent</text>

  <!-- Distance -->
  <text x="300" y="260" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" font-weight="600" letter-spacing="1.5"
    fill="#a3784a" fill-opacity="0.8">DIST</text>
  <text x="300" y="278" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="20" font-weight="700"
    fill="#f5deb3">14.2</text>
  <text x="300" y="292" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" fill="#78501e" fill-opacity="0.7">km</text>

  <!-- Vertical dividers -->
  <line x1="150" y1="248" x2="150" y2="296" stroke="#4a3b22" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="250" y1="248" x2="250" y2="296" stroke="#4a3b22" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Elevation gain label at bottom over the silhouette -->
  <text x="200" y="320" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="9" font-weight="400" letter-spacing="1.5"
    fill="#f97316" fill-opacity="0.55">ELEV +342m</text>
</svg>
