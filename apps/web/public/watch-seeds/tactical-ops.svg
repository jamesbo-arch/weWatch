<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="face-clip-to">
      <circle cx="200" cy="200" r="182"/>
    </clipPath>
    <pattern id="grid-tac" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#4a7c4a" stroke-width="0.4" stroke-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Bezel (dark military) -->
  <circle cx="200" cy="200" r="196" fill="#0d1a0d"/>
  <!-- Face background -->
  <circle cx="200" cy="200" r="182" fill="#1a2e1a"/>

  <!-- Grid overlay -->
  <circle cx="200" cy="200" r="182" fill="url(#grid-tac)" clip-path="url(#face-clip-to)"/>

  <!-- Outer ring (subtle olive) -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#4a7c4a" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Compass bearing indicator at top — tick marks -->
  <g clip-path="url(#face-clip-to)">
    <!-- Bearing scale arc area background -->
    <rect x="80" y="26" width="240" height="22" rx="3" fill="#0d1a0d" fill-opacity="0.6"/>
    <!-- Bearing tick marks -->
    <g stroke="#6aaa6a" stroke-opacity="0.7" stroke-width="1">
      <line x1="100" y1="30" x2="100" y2="38"/>
      <line x1="115" y1="30" x2="115" y2="35"/>
      <line x1="130" y1="30" x2="130" y2="38"/>
      <line x1="145" y1="30" x2="145" y2="35"/>
      <line x1="160" y1="30" x2="160" y2="38"/>
      <line x1="175" y1="30" x2="175" y2="35"/>
      <line x1="190" y1="30" x2="190" y2="38"/>
      <line x1="200" y1="30" x2="200" y2="42"/>
      <line x1="210" y1="30" x2="210" y2="38"/>
      <line x1="225" y1="30" x2="225" y2="35"/>
      <line x1="240" y1="30" x2="240" y2="38"/>
      <line x1="255" y1="30" x2="255" y2="35"/>
      <line x1="270" y1="30" x2="270" y2="38"/>
      <line x1="285" y1="30" x2="285" y2="35"/>
      <line x1="300" y1="30" x2="300" y2="38"/>
    </g>
    <!-- Bearing labels -->
    <text x="130" y="46" text-anchor="middle"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="8" fill="#6aaa6a" fill-opacity="0.7">SW</text>
    <text x="200" y="46" text-anchor="middle"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="8" font-weight="700" fill="#a3e635">W</text>
    <text x="270" y="46" text-anchor="middle"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="8" fill="#6aaa6a" fill-opacity="0.7">NW</text>
    <!-- Center marker -->
    <polygon points="200,26 197,33 203,33" fill="#a3e635" fill-opacity="0.9"/>
  </g>

  <!-- Bearing display -->
  <text x="200" y="88" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11" font-weight="600" letter-spacing="2"
    fill="#a3e635" fill-opacity="0.85">BEARING 247°</text>

  <!-- Time — monospace-style, bold -->
  <text x="200" y="196" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="72" font-weight="700" letter-spacing="2"
    fill="#c8e6b0">09:15</text>

  <!-- Seconds readout -->
  <text x="200" y="220" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="14" letter-spacing="3"
    fill="#6aaa6a" fill-opacity="0.7">:32</text>

  <!-- Horizontal dividers -->
  <line x1="60" y1="230" x2="340" y2="230" stroke="#4a7c4a" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Data row: steps left, stopwatch center, HR right -->
  <text x="108" y="252" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="8" font-weight="600" letter-spacing="1.5"
    fill="#6aaa6a" fill-opacity="0.7">STEPS</text>
  <text x="108" y="272" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="19" font-weight="700"
    fill="#c8e6b0">7,842</text>

  <text x="200" y="252" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="8" font-weight="600" letter-spacing="1.5"
    fill="#6aaa6a" fill-opacity="0.7">CHRONO</text>
  <text x="200" y="272" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="19" font-weight="700"
    fill="#a3e635">32:14</text>

  <text x="292" y="252" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="8" font-weight="600" letter-spacing="1.5"
    fill="#6aaa6a" fill-opacity="0.7">HR</text>
  <text x="292" y="272" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="19" font-weight="700"
    fill="#c8e6b0">127</text>

  <!-- Vertical dividers -->
  <line x1="152" y1="238" x2="152" y2="282" stroke="#4a7c4a" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="248" y1="238" x2="248" y2="282" stroke="#4a7c4a" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Bottom horizontal divider -->
  <line x1="60" y1="285" x2="340" y2="285" stroke="#4a7c4a" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Grid coordinates -->
  <text x="200" y="305" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" letter-spacing="1"
    fill="#6aaa6a" fill-opacity="0.65">37.7749° N  122.4194° W</text>

  <!-- Battery vertical bar (right side) -->
  <rect x="354" y="145" width="12" height="56" rx="2" fill="none" stroke="#6aaa6a" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="358" y="142" width="4" height="3" rx="1" fill="#6aaa6a" fill-opacity="0.5"/>
  <!-- Battery fill 82% -->
  <rect x="356" y="148" width="8" height="46" rx="1" fill="#6aaa6a" fill-opacity="0.7"/>
  <text x="360" y="216" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="8" fill="#6aaa6a" fill-opacity="0.55">82%</text>

  <!-- Date bottom -->
  <text x="200" y="332" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" letter-spacing="2"
    fill="#6aaa6a" fill-opacity="0.45">2026-05-08 THU</text>
</svg>
