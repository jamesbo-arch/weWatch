<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="face-clip-mm">
      <circle cx="200" cy="200" r="182"/>
    </clipPath>
  </defs>

  <!-- Bezel -->
  <circle cx="200" cy="200" r="196" fill="#050505"/>
  <!-- Watch face background -->
  <circle cx="200" cy="200" r="182" fill="#0a0a0a"/>

  <!-- Seconds arc ring (thin white, ~80% filled to simulate elapsed seconds) -->
  <!-- Full circle circumference at r=170: 2*pi*170 = 1068.14 -->
  <!-- 80% filled = dasharray 854.5 213.6 -->
  <circle cx="200" cy="200" r="170"
    fill="none"
    stroke="#ffffff"
    stroke-width="2"
    stroke-opacity="0.18"
    stroke-dasharray="1068.14"
    stroke-linecap="round"/>
  <circle cx="200" cy="200" r="170"
    fill="none"
    stroke="#ffffff"
    stroke-width="2"
    stroke-opacity="0.85"
    stroke-dasharray="721 347"
    stroke-dashoffset="267"
    stroke-linecap="round"
    transform="rotate(-90 200 200)"/>

  <!-- Tick marks (12 marks, every 30 degrees) -->
  <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="200" y1="30" x2="200" y2="42" transform="rotate(0 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="38" transform="rotate(30 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="38" transform="rotate(60 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="42" transform="rotate(90 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="38" transform="rotate(120 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="38" transform="rotate(150 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="42" transform="rotate(180 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="38" transform="rotate(210 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="38" transform="rotate(240 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="42" transform="rotate(270 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="38" transform="rotate(300 200 200)"/>
    <line x1="200" y1="30" x2="200" y2="38" transform="rotate(330 200 200)"/>
  </g>

  <!-- Digital time "10:42" -->
  <text x="200" y="215" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="72" font-weight="700" letter-spacing="-2"
    fill="#ffffff">10:42</text>

  <!-- Date "THU 08" -->
  <text x="200" y="248" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="16" font-weight="400" letter-spacing="3"
    fill="#ffffff" fill-opacity="0.55">THU 08</text>

  <!-- Thin divider line -->
  <line x1="168" y1="262" x2="232" y2="262" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Battery indicator bottom -->
  <!-- Battery icon -->
  <rect x="180" y="288" width="28" height="14" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="208" y="292" width="3" height="6" rx="1" fill="#ffffff" fill-opacity="0.5"/>
  <!-- Battery fill 73% -->
  <rect x="182" y="290" width="20" height="10" rx="1" fill="#ffffff" fill-opacity="0.7"/>

  <!-- Battery percentage text -->
  <text x="200" y="318" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="13" font-weight="400" letter-spacing="1"
    fill="#ffffff" fill-opacity="0.45">73%</text>

  <!-- Garmin logo mark (subtle) -->
  <text x="200" y="158" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="10" font-weight="400" letter-spacing="2"
    fill="#ffffff" fill-opacity="0.2">GARMIN</text>
</svg>
