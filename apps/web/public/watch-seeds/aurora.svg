<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="aurora-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#05050f"/>
    </radialGradient>
    <filter id="aurora-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="star-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="face-clip-au">
      <circle cx="200" cy="200" r="182"/>
    </clipPath>
  </defs>

  <!-- Bezel -->
  <circle cx="200" cy="200" r="196" fill="#020208"/>
  <!-- Face background -->
  <circle cx="200" cy="200" r="182" fill="url(#aurora-bg)"/>

  <!-- Aurora borealis curtains — blurred colored arcs -->
  <g clip-path="url(#face-clip-au)">
    <!-- Green aurora band -->
    <path d="M 30 180 Q 100 90 200 110 Q 300 130 370 80"
      fill="none" stroke="#00ff88" stroke-width="28" stroke-opacity="0.18"
      stroke-linecap="round" filter="url(#aurora-blur)"/>
    <path d="M 30 180 Q 100 90 200 110 Q 300 130 370 80"
      fill="none" stroke="#00e87a" stroke-width="12" stroke-opacity="0.12"
      stroke-linecap="round" filter="url(#aurora-blur)"/>

    <!-- Purple aurora band -->
    <path d="M 20 200 Q 90 110 200 130 Q 310 150 380 100"
      fill="none" stroke="#9b59b6" stroke-width="22" stroke-opacity="0.22"
      stroke-linecap="round" filter="url(#aurora-blur)"/>
    <path d="M 20 200 Q 90 110 200 130 Q 310 150 380 100"
      fill="none" stroke="#b44fde" stroke-width="10" stroke-opacity="0.16"
      stroke-linecap="round" filter="url(#aurora-blur)"/>

    <!-- Teal shimmer band -->
    <path d="M 50 220 Q 120 140 200 155 Q 280 170 360 115"
      fill="none" stroke="#00bcd4" stroke-width="16" stroke-opacity="0.14"
      stroke-linecap="round" filter="url(#aurora-blur)"/>

    <!-- Second green wave lower -->
    <path d="M 40 260 Q 130 180 220 200 Q 310 220 380 170"
      fill="none" stroke="#4cff9a" stroke-width="18" stroke-opacity="0.11"
      stroke-linecap="round" filter="url(#aurora-blur)"/>

    <!-- Pink highlight -->
    <path d="M 60 170 Q 140 100 200 120 Q 260 140 350 95"
      fill="none" stroke="#ff6ec7" stroke-width="10" stroke-opacity="0.1"
      stroke-linecap="round" filter="url(#aurora-blur)"/>

    <!-- Star dots scattered -->
    <circle cx="68" cy="72" r="1.2" fill="#ffffff" fill-opacity="0.9" filter="url(#star-glow)"/>
    <circle cx="112" cy="52" r="0.8" fill="#ffffff" fill-opacity="0.7"/>
    <circle cx="148" cy="66" r="1.5" fill="#ffffff" fill-opacity="0.8" filter="url(#star-glow)"/>
    <circle cx="176" cy="44" r="0.9" fill="#ffffff" fill-opacity="0.6"/>
    <circle cx="230" cy="56" r="1.1" fill="#ffffff" fill-opacity="0.85" filter="url(#star-glow)"/>
    <circle cx="265" cy="42" r="0.7" fill="#ffffff" fill-opacity="0.65"/>
    <circle cx="298" cy="68" r="1.3" fill="#ffffff" fill-opacity="0.75" filter="url(#star-glow)"/>
    <circle cx="332" cy="54" r="0.8" fill="#ffffff" fill-opacity="0.6"/>
    <circle cx="88" cy="108" r="0.9" fill="#ffffff" fill-opacity="0.55"/>
    <circle cx="52" cy="130" r="1.0" fill="#ffffff" fill-opacity="0.7" filter="url(#star-glow)"/>
    <circle cx="318" cy="92" r="0.8" fill="#ffffff" fill-opacity="0.6"/>
    <circle cx="352" cy="118" r="1.1" fill="#ffffff" fill-opacity="0.75" filter="url(#star-glow)"/>
    <circle cx="344" cy="152" r="0.7" fill="#ffffff" fill-opacity="0.5"/>
    <circle cx="50" cy="168" r="0.9" fill="#ffffff" fill-opacity="0.5"/>
    <circle cx="122" cy="96" r="0.7" fill="#a5f3fc" fill-opacity="0.6"/>
    <circle cx="272" cy="80" r="0.8" fill="#c4b5fd" fill-opacity="0.6"/>
    <circle cx="340" cy="200" r="0.6" fill="#ffffff" fill-opacity="0.4"/>
    <circle cx="42" cy="230" r="0.7" fill="#ffffff" fill-opacity="0.4"/>
    <circle cx="358" cy="270" r="0.8" fill="#ffffff" fill-opacity="0.35"/>
  </g>

  <!-- Subtle bezel tick marks (very dim) -->
  <g stroke="#4cff9a" stroke-opacity="0.2" stroke-width="1">
    <line x1="200" y1="20" x2="200" y2="30" transform="rotate(0 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="26" transform="rotate(30 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="26" transform="rotate(60 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="30" transform="rotate(90 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="26" transform="rotate(120 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="26" transform="rotate(150 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="30" transform="rotate(180 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="26" transform="rotate(210 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="26" transform="rotate(240 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="30" transform="rotate(270 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="26" transform="rotate(300 200 200)"/>
    <line x1="200" y1="20" x2="200" y2="26" transform="rotate(330 200 200)"/>
  </g>

  <!-- GARMIN label subtle -->
  <text x="200" y="148" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="9" font-weight="300" letter-spacing="3"
    fill="#a5f3fc" fill-opacity="0.25">GARMIN</text>

  <!-- Main time display — delicate white with green glow -->
  <text x="200" y="214" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="70" font-weight="200" letter-spacing="2"
    fill="#e0fff8"
    filter="url(#text-glow)">09:15</text>

  <!-- Date line -->
  <text x="200" y="240" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="12" font-weight="300" letter-spacing="3"
    fill="#4cff9a" fill-opacity="0.55">THU 08 MAY</text>

  <!-- Thin aurora-colored separator -->
  <line x1="150" y1="252" x2="250" y2="252" stroke="#9b59b6" stroke-opacity="0.3" stroke-width="1"/>

  <!-- HR (left) -->
  <text x="138" y="272" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" font-weight="400" letter-spacing="1.5"
    fill="#4cff9a" fill-opacity="0.6">HR</text>
  <text x="138" y="292" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="20" font-weight="300"
    fill="#e0fff8">68</text>
  <text x="138" y="306" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" fill="#4cff9a" fill-opacity="0.45">bpm</text>

  <!-- Steps (right) -->
  <text x="262" y="272" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" font-weight="400" letter-spacing="1.5"
    fill="#b44fde" fill-opacity="0.7">STEPS</text>
  <text x="262" y="292" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="20" font-weight="300"
    fill="#e0fff8">6,203</text>
  <text x="262" y="306" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8" fill="#b44fde" fill-opacity="0.45">steps</text>

  <!-- Battery bottom -->
  <text x="200" y="332" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="9" font-weight="300" letter-spacing="2"
    fill="#a5f3fc" fill-opacity="0.35">BATT 88%</text>
</svg>
